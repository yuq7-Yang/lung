# 基线模型训练参数（从/root/exp2_100epochs/weights/best.pt提取）
task: detect
mode: train
model: yolov8n.pt
data: /root/autodl-tmp/lung_ct/data.yaml
epochs: 100
patience: 20  # 修改为20轮早停
batch: 32
imgsz: 640
save: True
save_period: 10
cache: False
device: cuda
workers: 4
project: runs/train
name: exp2_100epochs
exist_ok: True
pretrained: True
optimizer: SGD
verbose: True
seed: 42
deterministic: True
single_cls: False
rect: False
cos_lr: True
close_mosaic: 10
resume: False
amp: True
fraction: 1.0
profile: False
freeze: None
multi_scale: False
overlap_mask: True
mask_ratio: 4
dropout: 0.0
val: True
split: val
save_json: False
save_hybrid: False
conf: null
iou: 0.7
max_det: 300
half: False
dnn: False
plots: True
source: null
vid_stride: 1
stream_buffer: False
visualize: False
augment: False
agnostic_nms: False
classes: null
retina_masks: False
embed: null
show: False
save_frames: False
save_txt: False
save_conf: False
save_crop: False
show_labels: True
show_conf: True
show_boxes: True
line_width: null
format: torchscript
keras: False
optimize: False
int8: False
dynamic: False
simplify: True
opset: null
workspace: 4
nms: False

# 优化器参数
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# 损失函数权重
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0
label_smoothing: 0.0
nbs: 64

# 数据增强
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
bgr: 0.0
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
copy_paste_mode: flip
auto_augment: randaugment
erasing: 0.4
crop_fraction: 1.0
